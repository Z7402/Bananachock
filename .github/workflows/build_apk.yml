name: Build and release Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Test, build and publish
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          java -version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze source
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Prepare optional release signing
        id: signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          values=(
            "$ANDROID_KEYSTORE_BASE64"
            "$ANDROID_KEYSTORE_PASSWORD"
            "$ANDROID_KEY_ALIAS"
            "$ANDROID_KEY_PASSWORD"
          )
          configured=0
          for value in "${values[@]}"; do
            if [ -n "$value" ]; then
              configured=$((configured + 1))
            fi
          done

          if [ "$configured" -eq 0 ]; then
            echo "Release signing secrets are not configured; using the Android debug key."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          elif [ "$configured" -ne 4 ]; then
            echo "Android signing secrets are only partially configured." >&2
            exit 1
          else
            keystore="$RUNNER_TEMP/bananachock-release.p12"
            umask 077
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore"
            keytool -list \
              -keystore "$keystore" \
              -storepass "$ANDROID_KEYSTORE_PASSWORD" \
              -alias "$ANDROID_KEY_ALIAS" > /dev/null
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "keystore=$keystore" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ARM64 release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.signing.outputs.keystore }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --split-per-abi \
            --build-number "$GITHUB_RUN_NUMBER"

          source_apk="build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
          test -f "$source_apk"
          mkdir -p dist
          cp "$source_apk" "dist/Bananachock-arm64-v8a.apk"
          sha256sum "dist/Bananachock-arm64-v8a.apk" > "dist/Bananachock-arm64-v8a.apk.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bananachock-arm64-v8a
          path: |
            dist/Bananachock-arm64-v8a.apk
            dist/Bananachock-arm64-v8a.apk.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          SIGNED_WITH_RELEASE_KEY: ${{ steps.signing.outputs.enabled }}
        run: |
          tag="build-${GITHUB_RUN_NUMBER}"
          title="Bananachock build ${GITHUB_RUN_NUMBER}"
          if [ "$SIGNED_WITH_RELEASE_KEY" = "true" ]; then
            signing_note="Signed with the configured private release key."
          else
            signing_note="CI preview build signed with the Android debug key. Configure repository signing secrets for production distribution."
          fi

          cat > "$RUNNER_TEMP/release-notes.md" <<EOF
          Automated Android ARM64 build from commit \`${GITHUB_SHA}\`.

          ${signing_note}
          EOF

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload "$tag" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$tag" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$title" \
              --notes-file "$RUNNER_TEMP/release-notes.md" \
              --latest
          fi
