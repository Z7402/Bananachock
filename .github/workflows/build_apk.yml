name: Build Bananachock APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle wrapper from scratch
        working-directory: android
        run: |
          rm -rf gradle/wrapper/gradle-wrapper.jar
          curl -sL "https://services.gradle.org/distributions/gradle-8.1.1-all.zip" -o /tmp/gradle.zip
          unzip -q -o /tmp/gradle.zip -d /tmp/gradle-extract
          cp /tmp/gradle-extract/gradle-8.1.1/lib/gradle-wrapper-*.jar gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.1.1/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          ls -la gradle/wrapper/
          java -jar gradle/wrapper/gradle-wrapper.jar --version 2>&1 || echo "Wrapper test done"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - run: flutter pub get
      - run: flutter build apk --debug --target-platform android-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: bananachock-debug-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
