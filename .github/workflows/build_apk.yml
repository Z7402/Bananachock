name: Build Bananachock APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Fix gradle wrapper
        run: |
          cd android/gradle/wrapper
          curl -sL -o gradle-wrapper.jar "https://raw.githubusercontent.com/gradle/gradle/v8.1.1/gradle/wrapper/gradle-wrapper.jar"
          ls -la gradle-wrapper.jar
          chmod +x ../../gradlew

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (ARM64 debug)
        run: flutter build apk --debug --target-platform android-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: bananachock-debug-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
