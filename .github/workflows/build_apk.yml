name: Build Bananachock APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Fix gradlew permissions and regenerate wrapper
        run: |
          chmod +x android/gradlew
          cd android
          export CI=true
          # Try flutter's built-in way: use flutter to run the build directly
          flutter build apk --debug --target-platform android-arm64

      - run: flutter pub get

      - name: Build APK directly with flutter
        run: flutter build apk --debug --target-platform android-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: bananachock-debug-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
