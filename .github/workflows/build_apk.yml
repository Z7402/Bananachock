name: Build Bananachock APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Fix gradle wrapper
        run: |
          cd android
          curl -sL -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.1.1/gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
      - name: Install dependencies
        run: flutter pub get
      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
      - name: Build Release APK
        run: |
          flutter build apk --release --target-platform android-arm64 \
            --android-skip-build-dependency-validation
        env:
          ANDROID_KEYSTORE_PATH: android/app/upload-keystore.jks
      - uses: actions/upload-artifact@v4
        with:
          name: bananachock-release-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error